<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fartcoin Scalping Calculator & Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #0f141c; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .card { background-color: #1a2230; border: 2px solid #2d394d; border-radius: 12px; }
        .form-label { font-weight: 600; color: #f8f9fa; font-size: 0.95rem; }
        .form-control { 
            background-color: #242f42; 
            color: #ffffff; 
            border: 2px solid #3b4b66; 
            font-weight: bold;
            font-size: 1.1rem;
        }
        .form-control:focus { background-color: #242f42; color: #ffffff; border-color: #0dcaf0; box-shadow: none; }
        
        /* Kontras Teks Hasil - Dibuat Jauh Lebih Terang & Jelas */
        .result-box-tp { background-color: #12281f; border-left: 5px solid #2ecc71; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        .result-box-jaring { background-color: #2c2512; border-left: 5px solid #f1c40f; padding: 15px; border-radius: 6px; }
        .text-tp-title { color: #2ecc71; font-weight: 800; font-size: 1.1rem; }
        .text-jaring-title { color: #f1c40f; font-weight: 800; font-size: 1.1rem; }
        .list-taktik li { color: #ffffff; font-size: 1.05rem; margin-bottom: 5px; font-weight: 500; }
        .list-taktik b { color: #0dcaf0; font-weight: 700; } /* Highlight angka dengan warna cyan cerah */

        /* History Styling */
        .history-item { background-color: #242f42; border: 1px solid #3b4b66; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .history-meta { font-size: 0.85rem; color: #a0aec0; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div class="card shadow-lg p-4 mb-4">
                <h3 class="text-center mb-3 fw-bold text-info">📊 FARTCOIN SCALPCALC v2</h3>
                <hr class="border-secondary mb-4">
                
                <div class="mb-3">
                    <label class="form-label">Harga Terakhir (Last Price)</label>
                    <input type="number" id="lastPrice" class="form-control" placeholder="Contoh: 2652" value="2652">
                </div>
                <div class="mb-3">
                    <label class="form-label">Harga Rata-rata Beli (Avg Price)</label>
                    <input type="number" id="avgPrice" class="form-control" placeholder="Contoh: 2680" value="2680">
                </div>
                <div class="mb-3">
                    <label class="form-label">Jumlah Koin Sekarang</label>
                    <input type="number" id="jmlKoin" class="form-control" placeholder="Contoh: 314" value="314">
                </div>
                <div class="mb-3">
                    <label class="form-label">Sisa Saldo Siap Pakai (IDR)</label>
                    <input type="number" id="saldoIdr" class="form-control" placeholder="Contoh: 245000" value="245000">
                </div>
                
                <button onclick="hitungStrategi()" class="btn btn-info btn-lg w-100 fw-bold my-2 text-dark shadow-sm">⚡ Hitung Taktik</button>
            </div>

            <div id="hasilSeksi" class="card shadow-lg p-4 mb-4 d-none">
                <h4 class="fw-bold mb-3 text-white">📋 Taktik Saat Ini</h4>
                
                <div class="result-box-tp">
                    <div class="text-tp-title mb-2">🎯 TARGET JUAL (TAKE PROFIT):</div>
                    <ul class="mb-0 list-unstyled list-taktik">
                        <li id="tp1"></li>
                        <li id="tp2"></li>
                        <li id="tp3"></li>
                    </ul>
                </div>

                <div class="result-box-jaring mt-3">
                    <div class="text-jaring-title mb-2">🛒 JARING BAWAH (TAMBAH POSISI):</div>
                    <ul class="mb-0 list-unstyled list-taktik">
                        <li id="jaring1"></li>
                        <li id="jaring2"></li>
                        <li id="jaring3"></li>
                    </ul>
                </div>

                <div class="mt-4 pt-3 border-top border-secondary">
                    <label class="form-label">Beri Nama Catatan Strategi Ini:</label>
                    <div class="input-group">
                        <input type="text" id="namaCatatan" class="form-control form-control-sm" placeholder="Misal: Sesi Pagi Teman Jaring, atau Pump 1">
                        <button onclick="simpanKeHistory()" class="btn btn-warning fw-bold text-dark">Simpan Ke History</button>
                    </div>
                </div>
            </div>

            <div class="card shadow-lg p-4 mb-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="fw-bold mb-0 text-white">⏳ Riwayat Taktik</h4>
                    <button onclick="eksporKeFolderDownload()" class="btn btn-success btn-sm fw-bold">💾 Export .TXT</button>
                </div>
                <div id="historyContainer" style="max-height: 400px; overflow-y: auto;">
                    <p id="emptyHistory" class="text-muted text-center my-3">Belum ada history yang disimpan.</p>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
// Variabel global penyimpan data sementara untuk history
let currentTaktikData = null;
let historyList = [];

function formatRupiah(angka) {
    return new Intl.NumberFormat('id-ID').format(Math.round(angka));
}

function getFormattedDate() {
    const d = new Date();
    const pad = (n) => n.toString().padStart(2, '0');
    
    const day = pad(d.getDate());
    const month = pad(d.getMonth() + 1);
    const year = d.getFullYear().toString().substring(2); // yy
    const hours = pad(d.getHours());
    const minutes = pad(d.getMinutes());
    const seconds = pad(d.getSeconds());

    return {
        filename: `${day}${month}${year}_${hours}${minutes}${seconds}`,
        display: `${d.getDate()}/${d.getMonth()+1}/20${year} ${hours}:${minutes}:${seconds}`
    };
}

function hitungStrategi() {
    const lastPrice = parseFloat(document.getElementById('lastPrice').value);
    const avgPrice = parseFloat(document.getElementById('avgPrice').value);
    const jmlKoin = parseFloat(document.getElementById('jmlKoin').value);
    const saldoIdr = parseFloat(document.getElementById('saldoIdr').value);

    if (isNaN(lastPrice) || isNaN(avgPrice) || isNaN(jmlKoin) || isNaN(saldoIdr)) {
        alert("Mohon isi semua data dengan benar!");
        return;
    }

    // Perhitungan Persentase
    const tp1Price = Math.round(avgPrice * 1.02);
    const tp2Price = Math.round(avgPrice * 1.04);
    const tp3Price = Math.round(avgPrice * 1.07);

    const tp1Qty = Math.floor(jmlKoin * 0.40);
    const tp2Qty = Math.floor(jmlKoin * 0.30);
    const tp3Qty = jmlKoin - (tp1Qty + tp2Qty);

    const danaJaring1 = Math.round(saldoIdr * 0.30);
    const danaJaring2 = Math.round(saldoIdr * 0.30);
    const danaJaring3 = Math.round(saldoIdr * 0.40);

    const hargaJaring1 = Math.round(lastPrice * 0.98);
    const hargaJaring2 = Math.round(lastPrice * 0.96);
    const hargaJaring3 = Math.round(lastPrice * 0.93);

    const estFart1 = (danaJaring1 / hargaJaring1).toFixed(1);
    const estFart2 = (danaJaring2 / hargaJaring2).toFixed(1);
    const estFart3 = (danaJaring3 / hargaJaring3).toFixed(1);

    // Update Teks Layar Utama dengan kontras tinggi
    document.getElementById('tp1').innerHTML = `• Jual 40% (<b>${tp1Qty}</b> FART) di harga: <b>${formatRupiah(tp1Price)}</b> (+2%)`;
    document.getElementById('tp2').innerHTML = `• Jual 30% (<b>${tp2Qty}</b> FART) di harga: <b>${formatRupiah(tp2Price)}</b> (+4%)`;
    document.getElementById('tp3').innerHTML = `• Jual Sisa (<b>${tp3Qty}</b> FART) di harga: <b>${formatRupiah(tp3Price)}</b> (+7%)`;

    document.getElementById('jaring1').innerHTML = `• Jaring 1 (30%): Pasang <b>Rp${formatRupiah(danaJaring1)}</b> di harga <b>${formatRupiah(hargaJaring1)}</b> (Est: ±${estFart1} FART)`;
    document.getElementById('jaring2').innerHTML = `• Jaring 2 (30%): Pasang <b>Rp${formatRupiah(danaJaring2)}</b> di harga <b>${formatRupiah(hargaJaring2)}</b> (Est: ±${estFart2} FART)`;
    document.getElementById('jaring3').innerHTML = `• Jaring 3 (40%): Pasang <b>Rp${formatRupiah(danaJaring3)}</b> di harga <b>${formatRupiah(hargaJaring3)}</b> (Est: ±${estFart3} FART)`;

    // Simpan objek data aktif ke memori global
    currentTaktikData = {
        lastPrice, avgPrice, jmlKoin, saldoIdr,
        tp1Price, tp2Price, tp3Price, tp1Qty, tp2Qty, tp3Qty,
        danaJaring1, danaJaring2, danaJaring3, hargaJaring1, hargaJaring2, hargaJaring3,
        estFart1, estFart2, estFart3
    };

    document.getElementById('namaCatatan').value = ""; // reset input nama catatan
    document.getElementById('hasilSeksi').classList.remove('d-none');
}

function simpanKeHistory() {
    if (!currentTaktikData) return;
    
    let namaLog = document.getElementById('namaCatatan').value.trim();
    if (namaLog === "") {
        namaLog = "Taktik Tanpa Nama";
    }

    const timeInfo = getFormattedDate();
    
    // Satukan data log ke baris riwayat
    const logItem = {
        nama: namaLog,
        waktu: timeInfo.display,
        data: { ...currentTaktikData }
    };

    historyList.unshift(logItem); // Masukkan ke paling atas daftar
    renderHistory();
}

function renderHistory() {
    const container = document.getElementById('historyContainer');
    if (historyList.length === 0) {
        document.getElementById('emptyHistory').classList.remove('d-none');
        return;
    }
    
    document.getElementById('emptyHistory').classList.add('d-none');
    container.innerHTML = "";

    historyList.forEach((item) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
            <div class="d-flex justify-content-between fw-bold mb-1">
                <span class="text-info">📌 ${item.nama}</span>
                <span class="history-meta">${item.waktu}</span>
            </div>
            <div style="font-size:0.9rem; color:#e2e8f0;">
                <b class="text-success">TP:</b> ${formatRupiah(item.data.tp1Price)} (${item.data.tp1Qty} FART) | ${formatRupiah(item.data.tp2Price)} | ${formatRupiah(item.data.tp3Price)} <br>
                <b class="text-warning">Jaring:</b> ${formatRupiah(item.data.hargaJaring1)} (Rp${formatRupiah(item.data.danaJaring1)}) | ${formatRupiah(item.data.hargaJaring2)} | ${formatRupiah(item.data.hargaJaring3)}
            </div>
        `;
        container.appendChild(div);
    });
}

function eksporKeFolderDownload() {
    if (historyList.length === 0) {
        alert("Belum ada history catatan untuk diekspor!");
        return;
    }

    let fileContent = "==================================================\n";
    fileContent += "        FASTRCOIN TRADING HISTORY LOG             \n";
    fileContent += "==================================================\n\n";

    historyList.forEach((item, index) => {
        fileContent += `[${index + 1}] NAMA CATATAN: ${item.nama}\n`;
        fileContent += `Waktu Input   : ${item.waktu}\n`;
        fileContent += `Harga Pasar   : ${formatRupiah(item.data.lastPrice)} IDR\n`;
        fileContent += `Avg Price     : ${formatRupiah(item.data.avgPrice)} IDR\n`;
        fileContent += `Jumlah Aset   : ${item.data.jmlKoin} FART\n`;
        fileContent += `Sisa Saldo    : Rp ${formatRupiah(item.data.saldoIdr)}\n`;
        fileContent += `--------------------------------------------------\n`;
        fileContent += `🎯 TARGET TAKE PROFIT:\n`;
        fileContent += `   - Jual 40% (${item.data.tp1Qty} FART) di harga: ${formatRupiah(item.data.tp1Price)}\n`;
        fileContent += `   - Jual 30% (${item.data.tp2Qty} FART) di harga: ${formatRupiah(item.data.tp2Price)}\n`;
        fileContent += `   - Jual Sisa (${item.data.tp3Qty} FART) di harga: ${formatRupiah(item.data.tp3Price)}\n`;
        fileContent += `🛒 JARING BELI BAWAH:\n`;
        fileContent += `   - Jaring 1: Rp ${formatRupiah(item.data.danaJaring1)} di harga ${formatRupiah(item.data.hargaJaring1)} (Est: +${item.data.estFart1} FART)\n`;
        fileContent += `   - Jaring 2: Rp ${formatRupiah(item.data.danaJaring2)} di harga ${formatRupiah(item.data.hargaJaring2)} (Est: +${item.data.estFart2} FART)\n`;
        fileContent += `   - Jaring 3: Rp ${formatRupiah(item.data.danaJaring3)} di harga ${formatRupiah(item.data.hargaJaring3)} (Est: +${item.data.estFart3} FART)\n`;
        fileContent += "\n==================================================\n\n";
    });

    const timeInfo = getFormattedDate();
    const fileName = `taktikax_${timeInfo.filename}.txt`;

    // Proses download otomatis file teks lewat browser
    const blob = new Blob([fileContent], { type: 'text/plain' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>
</body>
</html>
